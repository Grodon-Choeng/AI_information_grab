services:
  postgres:
    image: postgres:17
    container_name: ai-information-grab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_information_grab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_information_grab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
